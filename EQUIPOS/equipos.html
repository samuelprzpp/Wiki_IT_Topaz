<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wiki IT - Equipos</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #0a3d62, #3c6382);
      color: #fff;
      padding: 20px;
      text-align: center;
      border-bottom: 5px solid #f1c40f;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
      letter-spacing: 1px;
    }
    .contenedor {
      display: flex;
      gap: 20px;
      padding: 30px;
    }
    .problemas {
      width: 35%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .problemas h2 {
      background: #0a3d62;
      color: #fff;
      margin: 0;
      padding: 10px;
      border-bottom: 3px solid #f1c40f;
      border-radius: 8px 8px 0 0;
    }
    .item {
      cursor: pointer;
      padding: 12px;
      border-bottom: 1px solid #eee;
      transition: background 0.3s;
    }
    .item:hover {
      background: #f1c40f33;
    }
    .solucion {
      width: 65%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .solucion h2 {
      color: #0a3d62;
      margin-top: 0;
    }
    .solucion img {
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 10px;
    }
    footer {
      background: #0a3d62;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
      border-top: 5px solid #f1c40f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Problemas de Hardware</h1>
    <p>Selecciona un problema para ver la solución</p>
  </header>

  <div class="contenedor">
    <!-- Lista de problemas -->
    <div class="problemas">
      <h2>Lista de problemas</h2>
      <div class="item" onclick="mostrarSolucion('pantalla')">Pantalla no enciende</div>
      <div class="item" onclick="mostrarSolucion('ram')">Error con la RAM</div>
      <div class="item" onclick="mostrarSolucion('inyector')">Marcador de Tráfico no funciona</div>
      <div class="item" onclick="mostrarSolucion('imp')">Impresion con carácteres y simbolos en la Factura</div>
    </div>

    <!-- Panel de solución -->
    <div class="solucion" id="panelSolucion">
      <h2>Selecciona un problema</h2>
      <p>Aquí aparecerá la solución.</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Wiki IT Interna - Equipos</p>
  </footer>

  <script>
    function mostrarSolucion(problema) {
      let panel = document.getElementById("panelSolucion");
      if (problema === "pantalla") {
        panel.innerHTML = `
          <h2>Pantalla no enciende</h2>
          <p><strong>Solución:</strong> Revisar RAM, probar monitor externo, verificar conexión de pantalla, botar la energia residual (Mantener el boton de encendido presionado 30s</p>
          <img src="" >
        `;
      } else if (problema === "ram") {
        panel.innerHTML = `
          <h2>Error con la RAM</h2>
          <p><strong>Solución:</strong> Limpiar contactos, probar módulo en otro slot, reemplazar si falla.</p>
          <img src="" >
        `;
      } else if (problema === "inyector") {
        panel.innerHTML = `
          <h2>Marcador de Tráfico no funciona</h2>
          <p><strong>Solución:</strong>Revisar que el Inyector este encendido, si lo esta y no funciona desconectar los 3 cables que tiene conectados alrededor de 5 minutos y volver a conectar, si sigue con fallos se debe revisar cableado </p>
          <img src="" >
        `;
      } else if (problema === "imp") {
        panel.innerHTML = `
          <h2>Impresion con carácteres y simbolos en la Factura</h2>
          <p><strong>Solución:</strong>Revisar el driver que el equipo esta usando, borrar completamente el impresora, reiniciar el servicio de cola de impresion y reinstalar</p>
          <img src="imagenes/caracteres.jpeg" >
        `;
      } 
    }
  </script>
</body>
</html>
