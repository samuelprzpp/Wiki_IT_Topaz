<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wiki IT - OFICINA</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #0a3d62, #3c6382);
      color: #fff;
      padding: 20px;
      text-align: center;
      border-bottom: 5px solid #f1c40f;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
      letter-spacing: 1px;
    }
    .contenedor {
      display: flex;
      gap: 20px;
      padding: 30px;
    }
    .problemas {
      width: 35%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .problemas h2 {
      background: #0a3d62;
      color: #fff;
      margin: 0;
      padding: 10px;
      border-bottom: 3px solid #f1c40f;
      border-radius: 8px 8px 0 0;
    }
    .item {
      cursor: pointer;
      padding: 12px;
      border-bottom: 1px solid #eee;
      transition: background 0.3s;
    }
    .item:hover {
      background: #f1c40f33;
    }
    .solucion {
      width: 65%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .solucion h2 {
      color: #0a3d62;
      margin-top: 0;
    }
    footer {
      background: #0a3d62;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
      border-top: 5px solid #f1c40f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Problemas de Hardware</h1>
    <p>Selecciona un problema para ver la solución</p>
  </header>

  <div class="contenedor">
    <!-- Lista de problemas -->
    <div class="problemas">
      <h2>Lista de problemas</h2>
      <div class="item" onclick="mostrarSolucion('pantalla')">Conflicto en Dominio Topaz</div>
      <div class="item" onclick="mostrarSolucion('ram')">Error de controladores ODBC</div>
      <div class="item" onclick="mostrarSolucion('of1')">Agregar Codigo de Barra a reporte de PEDIDO en SRAP</div>
    </div>

    <!-- Panel de solución -->
    <div class="solucion" id="panelSolucion">
      <h2>Selecciona un problema</h2>
      <p>Aquí aparecerá la solución.</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Wiki IT Interna - Hardware</p>
  </footer>

  <script>
    function mostrarSolucion(problema) {
      let panel = document.getElementById("panelSolucion");
      if (problema === "pantalla") {
        panel.innerHTML = `
          <h2>Conflicto en Dominio Topaz</h2>
          <p><strong>Solución:</strong> Sacar al equipo del Dominio de Topaz, luego con el perfil de administrador local volverlo a añadir y probar de nuevo las credenciales del usuario</p>
          <img src="imagenes/error.png" >
        `;
      } else if (problema === "ram") {
        panel.innerHTML = `
          <h2>Problemas ODBC para correr aplicaciones de red</h2>
          <p><strong>Solución:</strong> ODBC necesarios para correr programas relacionados con LIRIOS Y TOPAZ </p>
          <img src="imagenes/odbc.png" >
        `;
      } else if (problema === "of1") {
        panel.innerHTML = `
          <h2>Agregar Codigo de Barra a reporte de PEDIDO en SRAP</h2>
          <p><strong>Solución:</strong></p>
          <img src="imagenes/reportepedido.png" >
        `;
      }
    }
  </script>
</body>
</html>
