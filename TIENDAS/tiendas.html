<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wiki IT - TIENDAS</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #0a3d62, #3c6382);
      color: #fff;
      padding: 20px;
      text-align: center;
      border-bottom: 5px solid #f1c40f;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
      letter-spacing: 1px;
    }
    .contenedor {
      display: flex;
      gap: 20px;
      padding: 30px;
    }
    .problemas {
      width: 35%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .problemas h2 {
      background: #0a3d62;
      color: #fff;
      margin: 0;
      padding: 10px;
      border-bottom: 3px solid #f1c40f;
      border-radius: 8px 8px 0 0;
    }
    .item {
      cursor: pointer;
      padding: 12px;
      border-bottom: 1px solid #eee;
      transition: background 0.3s;
    }
    .item:hover {
      background: #f1c40f33;
    }
    .solucion {
      width: 65%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .solucion h2 {
      color: #0a3d62;
      margin-top: 0;
    }
    footer {
      background: #0a3d62;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
      border-top: 5px solid #f1c40f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Problemas de Tiendas CR/SV</h1>
    <p>Selecciona un problema para ver la solución</p>
  </header>

  <div class="contenedor">
    <!-- Lista de problemas -->
    <div class="problemas">
      <h2>Lista de problemas</h2>
      <div class="item" onclick="mostrarSolucion('pantalla')">No esta creada la cookie</div>
      <div class="item" onclick="mostrarSolucion('ram')">Ya hay un SRAP ejecutandose</div>
      <div class="item" onclick="mostrarSolucion('hdd')">Disco duro ruidoso</div>
    </div>

    <!-- Panel de solución -->
    <div class="solucion" id="panelSolucion">
      <h2>Selecciona un problema</h2>
      <p>Aquí aparecerá la solución.</p>
    </div>
  </div>

  <footer>
    <p>© 2026 Wiki IT Interna - Hardware</p>
  </footer>

  <script>
    function mostrarSolucion(problema) {
      let panel = document.getElementById("panelSolucion");
      if (problema === "pantalla") {
        panel.innerHTML = `
          <h2>No esta creada la cookie</h2>
          <p><strong>Solución:</strong> Verificar que la tiende este ingresando mediante el siguiente enlace:        https://www.originalpenguin.co.cr/admin/</p>
          <img src="imagenes/cookie.png" >
        `;
      } else if (problema === "ram") {
        panel.innerHTML = `
          <h2>Ya hay un SRAP ejecutandose</h2>
          <p><strong>Solución:</strong> Ir al administrador de tareas>>En la pestaña Detalle, terminar todo proceso del SRAP y volver a abrir si en dado caso continua reiniciar equipo</p>
          <img src="imagenes/SRAP1.png" >
        `;
      } else if (problema === "hdd") {
        panel.innerHTML = `
          <h2>Disco duro ruidoso</h2>
          <p><strong>Solución:</strong> Respaldar datos inmediatamente, revisar SMART, considerar reemplazo.</p>
          <img src="imagenes/hdd_ruidoso.jpg" alt="Disco duro con ruido">
        `;
      }
    }
  </script>
</body>
</html>
